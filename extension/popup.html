<!DOCTYPE html>
<html>
<head>
  <title>Autofill</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --border: #d9deea;
      --primary: #2454d6;
      --primary-strong: #173ea3;
      --danger: #b42318;
      --success: #067647;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 360px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 Arial, sans-serif;
    }

    .app {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
    }

    .badge {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      background: #fff;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
    }

    .file-zone {
      display: block;
      border: 1px dashed #aab4c8;
      border-radius: 8px;
      padding: 14px;
      background: #fbfcff;
      cursor: pointer;
    }

    .file-zone:focus-within {
      outline: 2px solid rgba(36, 84, 214, 0.25);
    }

    .file-title {
      display: block;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .file-name {
      display: block;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #fileInput {
      width: 1px;
      height: 1px;
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 38px;
    }

    .field-value input {
      width: 100%;
      border: 1px solid #d9deea;
      border-radius: 6px;
      padding: 6px 8px;
      background: #f8fafc;
      font-size: 12px;
      color: var(--text);
    }

    #uploadBtn {
      background: var(--primary);
      color: white;
    }

    #uploadBtn:hover:not(:disabled) {
      background: var(--primary-strong);
    }

    #clearBtn {
      background: #eef1f7;
      color: #344054;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    .progress {
      display: none;
      height: 4px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e7ebf3;
    }

    .progress.active {
      display: block;
    }

    .progress span {
      display: block;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: var(--primary);
      animation: loading 1.1s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(240%); }
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: #fbfcff;
    }

    .metric-value {
      display: block;
      font-size: 18px;
      font-weight: 700;
    }

    .metric-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
    }

    .result {
      display: none;
      margin-top: 12px;
      max-height: 150px;
      overflow: auto;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .result.visible {
      display: block;
    }

    .field-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 8px;
      padding: 5px 0;
      border-bottom: 1px solid #eef1f7;
      font-size: 12px;
    }

    .field-row:last-child {
      border-bottom: 0;
    }

    

    .field-key {
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .field-value {
      color: var(--text);
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Autofill</h1>
    </header>

    <section class="panel">
      <label class="file-zone" for="fileInput">
        <span class="file-title">Select documents</span>
        <span class="file-name" id="fileName">Images, PDF, TXT, DOCX, XLSX, PPTX</span>
        <input type="file" id="fileInput" multiple accept="image/*,.pdf,.txt,.csv,.tsv,.json,.xml,.html,.htm,.md,.log,.docx,.xlsx,.xlsm,.pptx,application/pdf">
      </label>

      <div class="actions">
        <button id="uploadBtn">Extract</button>
        <button id="clearBtn" type="button">Clear</button>
      </div>

      <div class="progress" id="progress"><span></span></div>
      <div style="display:flex; align-items:center; gap:8px;">
        <p class="status" id="status">Ready.</p>
        <span id="modeBadge" class="badge" style="display:none; font-size:11px; padding:4px 6px;"></span>
      </div>

      <div class="metrics">
        <div class="metric">
          <span class="metric-value" id="extractedMetric">0</span>
          <span class="metric-label">Extracted</span>
        </div>
        <div class="metric">
          <span class="metric-value" id="filledMetric">0</span>
          <span class="metric-label">Filled</span>
        </div>
      </div>

      <div class="result" id="resultList"></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
